<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Edit Collection</title>
  <link rel="stylesheet" href="/admin/static/admin.css?v=20260429-1">
</head>
<body>
  <header class="admin-topbar">
    <div>
      <p class="eyebrow">Real Good Data Admin</p>
      <h1>Edit Collection</h1>
      <nav class="admin-nav">
        <a href="/admin/catalog?tab=create-collection">Create Collection</a>
        <a href="/admin/catalog?tab=list-collections" class="active">List Collections</a>
        <a href="/admin/catalog?tab=import-data">Import Data</a>
        <a href="/admin/catalog?tab=list-data">List Data</a>
        <a href="/admin/tokens">Tokens</a>
      </nav>
    </div>
    <a href="/admin/catalog?tab=list-collections" class="button-secondary button-link">Back to collections</a>
  </header>
  <main class="admin-layout single-panel">
    {% if message %}<div class="notice success">{{ message }}</div>{% endif %}
    {% if error %}<div class="notice error">{{ error }}</div>{% endif %}
    <section class="panel">
      <form method="post" action="/admin/collections/{{ edit_collection.id }}" class="form-grid form-stack">
        <label>
          <span>Title</span>
          <input type="text" name="title" value="{{ edit_collection.title }}" required>
        </label>
        <br>
        <label>
          <span>Slug</span>
          <input type="text" name="slug" value="{{ edit_collection.slug }}" required>
        </label>
        <br>
        <label class="full">
          <span>Summary</span>
          <textarea name="summary" rows="4">{{ edit_collection.summary or '' }}</textarea>
        </label>
        <br>
        <label class="full">
          <span>Tags</span>
          <input type="text" name="tags" value="{{ edit_collection.tags or '' }}" placeholder="gaza, population, methods">
        </label>
        <br>
        <label>
          <span>Published at</span>
          <input type="datetime-local" name="published_at" value="{{ edit_collection.published_at.strftime('%Y-%m-%dT%H:%M') if edit_collection.published_at else '' }}">
        </label>
        <br>
        <div class="full actions">
          <button type="submit" class="button-primary">Save collection</button>
        </div>
      </form>
      <datalist id="bucket-options">
        {% for bucket_name in bucket_names %}
        <option value="{{ bucket_name }}"></option>
        {% endfor %}
      </datalist>
    </section>
  </main>
</body>
</html>
