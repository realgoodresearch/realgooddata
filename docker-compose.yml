services:
  minio:
    image: minio/minio:latest
    container_name: data-portal-minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./data/minio:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 4G
    networks:
      - data_portal

  broker-api:
    build:
      context: ./broker-api
    container_name: data-portal-broker
    restart: unless-stopped
    environment:
      BROKER_HOST: 0.0.0.0
      BROKER_PORT: 8000
      MINIO_ENDPOINT: http://minio:9000
      MINIO_REGION: us-east-1
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_SECURE: "false"
      PRESIGNED_URL_TTL_SECONDS: ${PRESIGNED_URL_TTL_SECONDS:-300}
      TOKEN_CONFIG_PATH: /app/config/tokens.json
    volumes:
      - ./broker-api/config:/app/config:ro
    depends_on:
      minio:
        condition: service_healthy
    expose:
      - "8000"
    networks:
      - data_portal

  nginx:
    build:
      context: ./nginx
    container_name: data-portal-nginx
    restart: unless-stopped
    depends_on:
      - broker-api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./frontend:/usr/share/nginx/html:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    networks:
      - data_portal

  certbot:
    image: certbot/certbot:latest
    container_name: data-portal-certbot
    restart: unless-stopped
    depends_on:
      - nginx
    entrypoint: /bin/sh
    command:
      - -c
      - |
        trap exit TERM;
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet;
          sleep 12h & wait $${!};
        done
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    networks:
      - data_portal

networks:
  data_portal:
    name: data_portal
